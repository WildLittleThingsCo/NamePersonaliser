<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wild Little Things & Co</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Optional: add Google Fonts or your licensed fonts here -->
</head>
<body>
  <main class="container">
<header class="site-header">
    <img src="WLT Banner.png" alt="Wild Little Things & Co" class="site-banner" />

    <p class="tagline">
        Design your personalised name before ordering
    </p>
</header>
<section class="controls">
  <label class="field">
    <span>Enter your name</span>

    <input
      id="nameInput"
      type="text"
      maxlength="20"
      placeholder="Type a name..."
      value="NAME"
    />
  </label>

  <label class="field">
    <span>Choose your collection</span>

    <select id="collectionSelect">
      <option value="ceramic">
        Ceramic Wall Collection
      </option>

      <option value="wildBear">
        Wild Bear Collection
      </option>
    </select>
  </label>

  <div class="letter-customiser">
    <div class="section-heading">
      Choose each letter colour
    </div>

    <p class="section-description">
      Select colour for each letter to create your design.
    </p>

    <div
      id="letterColorControls"
      class="letter-color-controls"
    ></div>
  </div>

  <label class="field">
    <span>Upload a room photo (optional)</span>

    <input
      id="bgUpload"
      type="file"
      accept="image/*"
    />
  </label>

  <div class="action-buttons">
    <button id="resetBtn" type="button">
      Reset
    </button>

    <button id="downloadBtn" type="button">
      Download preview
    </button>
  </div>
</section>

<section class="preview-section">
  <canvas
    id="previewCanvas"
    width="1200"
    height="700"
  ></canvas>

  <p class="preview-disclaimer">
    Preview colours are a guide only and may vary slightly between screens
    and finished products.
  </p>
</section>

<script src="app.js"></script>

</body>
</html>
